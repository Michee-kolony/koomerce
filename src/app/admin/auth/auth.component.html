<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-red-50 to-red-100 p-4">

  <div class="bg-white shadow-2xl rounded-3xl flex flex-col md:flex-row w-full max-w-5xl overflow-hidden transition-all duration-300 hover:shadow-3xl">

    <!-- LEFT -->
    <div class="hidden md:block md:w-1/2 bg-gradient-to-br from-red-600 to-red-700 relative overflow-hidden">
      <img src="images/1 - Copie-Photoroom.png"
           class="h-full w-full object-cover opacity-80">

      <div class="absolute inset-0 flex items-center justify-center text-white text-center">
        <div>
          <h2 class="text-4xl font-bold">Espace Admin</h2>
          <p>Connexion sécurisée</p>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="w-full md:w-1/2 p-8">

      <h2 class="text-2xl font-bold text-center mb-6">Connexion Admin</h2>

      <form (ngSubmit)="onSubmit()" class="space-y-4">

        <!-- EMAIL -->
        <input type="email"
               [(ngModel)]="email"
               name="email"
               placeholder="Email"
               required
               class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-red-300 outline-none">

        <!-- PASSWORD -->
        <div class="relative">
          <input [type]="showPassword ? 'text' : 'password'"
                 [(ngModel)]="password"
                 name="password"
                 placeholder="Mot de passe"
                 required
                 class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-red-300 outline-none">

          <button type="button"
                  (click)="togglePassword()"
                  class="absolute right-3 top-3 text-sm text-gray-500">
            {{ showPassword ? 'Cacher' : 'Voir' }}
          </button>
        </div>

        <!-- BUTTON -->
        <button type="submit"
                [disabled]="loading"
                class="w-full bg-red-600 hover:bg-red-700 text-white p-3 rounded-xl flex items-center justify-center transition">

          <!-- SPINNER -->
          <div *ngIf="loading" class="flex items-center space-x-2">
            <svg class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></svg>
            <span>Connexion...</span>
          </div>

          <span *ngIf="!loading">Se connecter</span>

        </button>

      </form>
    </div>
  </div>
</div>

<!-- SUCCESS POPUP -->
<div *ngIf="showSuccessPopup"
     class="fixed top-5 right-5 bg-green-500 text-white p-4 rounded-xl shadow-lg animate-fadeIn">
  {{ successMessage }}
  <button (click)="closeSuccess()" class="ml-3 font-bold">✖</button>
</div>

<!-- ERROR POPUP -->
<div *ngIf="showErrorPopup"
     class="fixed top-5 right-5 bg-red-500 text-white p-4 rounded-xl shadow-lg animate-fadeIn">
  {{ errorMessage }}
  <button (click)="closeError()" class="ml-3 font-bold">✖</button>
</div>
