<div class="min-h-screen bg-gray-100 p-4 md:p-10">

  <!-- HEADER -->
  <div class="max-w-6xl mx-auto mb-6">
    <h1 class="text-2xl md:text-4xl font-bold text-gray-800">
      Messages reçus
    </h1>

    <p class="text-gray-500 mt-2">
      Consultez les messages envoyés par vos clients
    </p>
  </div>

  <!-- SEARCH -->
  <div class="max-w-6xl mx-auto mb-6">
    <input
      type="text"
      [(ngModel)]="searchText"
      (input)="filterMessages()"
      placeholder="Rechercher par nom, email, sujet..."
      class="w-full p-3 rounded-xl border shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
  </div>

  <!-- LIST -->
  <div class="max-w-6xl mx-auto grid gap-4 md:grid-cols-2">

    <div
      *ngFor="let msg of filteredMessages"
      class="bg-white rounded-2xl shadow-md p-5 hover:shadow-xl transition"
    >

      <!-- TOP -->
      <div class="flex justify-between items-start mb-3">

        <div>
          <h2 class="font-bold text-lg text-gray-800">
            {{ msg.nom }}
          </h2>

          <p class="text-sm text-gray-500">
            {{ msg.email }}
          </p>
        </div>

        <span class="text-xs bg-blue-100 text-blue-600 px-3 py-1 rounded-full">
          {{ getTimeAgo(msg.createdAt) }}
        </span>

      </div>

      <!-- SUBJECT -->
      <div class="mb-2">
        <span class="font-semibold text-gray-700">Sujet :</span>
        <span class="text-gray-600">{{ msg.sujet }}</span>
      </div>

      <!-- MESSAGE -->
      <p class="text-gray-600 mb-4">
        {{ msg.message }}
      </p>

      <!-- FOOTER -->
      <div class="flex justify-between items-center text-sm text-gray-500">

        <span>
          {{ msg.telephone }}
        </span>

        <!-- DELETE BUTTON -->
        <button
          (click)="deleteMessage(msg._id)"
          class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-xs transition"
          [disabled]="deletingId === msg._id"
        >
          {{ deletingId === msg._id ? 'Suppression...' : 'Supprimer' }}
        </button>

      </div>

    </div>

  </div>

  <!-- EMPTY -->
  <div *ngIf="!loading && filteredMessages.length === 0"
       class="text-center text-gray-500 mt-10">
    Aucun message trouvé
  </div>
</div>


<div *ngIf="loading" class="bg-white/50 fixed top-0 left-0 right-0 bottom-0 flex justify-center items-center">
  <div>
    <span class="loader mx-auto text-center"></span>
  </div>
</div>
