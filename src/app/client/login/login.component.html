<div class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden bg-gradient-to-br from-red-500 via-red-600 to-red-700">

  <!-- DECORATIONS -->
  <div class="absolute w-72 h-72 bg-red-300 rounded-full blur-3xl opacity-30 top-10 left-10"></div>
  <div class="absolute w-96 h-96 bg-red-600 rounded-full blur-3xl opacity-30 bottom-10 right-10"></div>
  <div class="absolute w-60 h-60 bg-red-200 rounded-full blur-2xl opacity-20 top-1/2 left-1/3"></div>

  <div class="w-full max-w-md bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl p-8 space-y-6 border border-white/20 relative z-10">

    <!-- LOGO -->
    <div class="flex justify-center">
      <div class="w-24 h-24 rounded-full shadow-lg flex items-center justify-center overflow-hidden border-4 border-white">
        <img src="images/1 - Copie-Photoroom.png">
      </div>
    </div>

    <!-- TITLE -->
    <div class="text-center">
      <h1 class="text-3xl font-bold text-gray-800">
        App <span class="text-red-500">Koomerce</span>
      </h1>
      <p class="text-gray-600 mt-2">Connectez-vous à votre compte</p>
    </div>

    <!-- FORM -->
    <form class="space-y-5" (ngSubmit)="onSubmit()">

      <!-- EMAIL -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-envelope mr-2 text-red-500"></i>
          Adresse email
        </label>

        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-red-500 focus:ring-2 focus:ring-red-500/20 focus:outline-none"
          required
        />
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-lock mr-2 text-red-500"></i>
          Mot de passe
        </label>

        <div class="relative">

          <input
            [(ngModel)]="password"
            name="password"
            [type]="showPassword ? 'text' : 'password'"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 pr-12 focus:border-red-500 focus:ring-2 focus:ring-red-500/20 focus:outline-none"
            required
          />

          <button
            type="button"
            (click)="togglePassword()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500"
          >
            <i *ngIf="!showPassword" class="fa-solid fa-eye"></i>
            <i *ngIf="showPassword" class="fa-solid fa-eye-slash"></i>
          </button>

        </div>
      </div>

      <!-- FORGOT -->
      <div class="text-right text-sm">
        <a routerLink="/forgot-password" class="text-red-500 hover:underline">
          Mot de passe oublié ?
        </a>
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-red-500 to-red-700 text-white font-bold py-3.5 rounded-lg shadow-lg"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Se connecter</span>
        <span *ngIf="loading">
          <i class="fas fa-spinner fa-spin mr-2"></i>
          Connexion...
        </span>
      </button>

      <!-- LINK LOGIN -->
      <div class="text-center text-sm">
        Pas de compte ?
        <a routerLink="/register" class="text-red-500 font-bold"> Créer un compte</a>
      </div>

    </form>
  </div>
</div>


<!-- 🔔 TOAST POPUPS (BOTTOM RIGHT) -->
<div class="fixed bottom-5 right-5 z-50 flex flex-col gap-3">

  <!-- SUCCESS -->
  <div *ngIf="showSuccessPopup"
       class="animate-slideIn bg-white border-l-4 border-green-500 shadow-xl rounded-lg px-4 py-3 w-72 flex items-center gap-3">

    <div class="text-green-600 text-xl">
      <i class="fas fa-check-circle"></i>
    </div>

    <p class="text-sm text-gray-700 flex-1 font-medium mt-2">
      {{ successMessage }}
    </p>

    <button (click)="closeSuccess()"
            class="text-gray-400 hover:text-gray-600">
      ✖
    </button>
  </div>

  <!-- ERROR -->
  <div *ngIf="showErrorPopup"
       class="animate-slideIn bg-white border-l-4 border-red-500 shadow-xl rounded-lg px-4 py-3 w-72 flex items-center gap-3">

    <div class="text-red-600 text-xl">
      <i class="fas fa-times-circle"></i>
    </div>

    <p class="text-sm text-gray-700 flex-1 font-medium mt-2">
      {{ errorMessage }}
    </p>

    <button (click)="closeError()"
            class="text-gray-400 hover:text-gray-600">
      ✖
    </button>
  </div>

</div>
