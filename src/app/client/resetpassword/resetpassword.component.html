<div class="min-h-screen flex items-center justify-center px-4 bg-cover bg-center bg-fixed"
     [style.background-image]="'url(images/1.jpg)'">

  <div class="w-full max-w-md bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl p-8 space-y-6 border border-white/20 relative z-10">

    <!-- LOGO -->
    <div class="flex justify-center">
      <div class="w-24 h-24 rounded-full shadow-lg flex items-center justify-center overflow-hidden border-4 border-white">
        <img src="images/1 - Copie-Photoroom.png" alt="logo">
      </div>
    </div>

    <!-- TITLE -->
    <div class="text-center">
      <h1 class="text-3xl font-bold text-gray-800">
        Nouveau <span class="text-[#fe312e]">mot de passe</span>
      </h1>
      <p class="text-gray-600 mt-2">
        Choisissez un nouveau mot de passe sécurisé
      </p>
    </div>

    <!-- FORM -->
    <form class="space-y-5" (ngSubmit)="onSubmit()">

      <!-- PASSWORD -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-lock mr-2 text-[#fe312e]"></i>
          Nouveau mot de passe
        </label>

        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          name="password"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-[#fe312e] focus:ring-2 focus:ring-[#fe312e]/20 focus:outline-none transition"
          required
        />
      </div>

      <!-- CONFIRM PASSWORD -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-lock mr-2 text-[#fe312e]"></i>
          Confirmer mot de passe
        </label>

        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-[#fe312e] focus:ring-2 focus:ring-[#fe312e]/20 focus:outline-none transition"
          required
        />
      </div>

      <!-- SHOW PASSWORD -->
      <div class="flex items-center gap-2 text-sm text-gray-600">
        <input type="checkbox" (change)="togglePassword()">
        <span>Afficher le mot de passe</span>
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-[#fe312e] to-red-600 hover:from-red-600 hover:to-[#fe312e] text-white font-bold py-3.5 rounded-lg shadow-lg transition-all duration-300"
        [disabled]="loading"
      >
        <span *ngIf="!loading">
          Changer le mot de passe
        </span>

        <span *ngIf="loading">
          <i class="fas fa-spinner fa-spin mr-2"></i>
          Mise à jour...
        </span>
      </button>

    </form>
  </div>
</div>

<!-- ================= SUCCESS POPUP ================= -->
<div *ngIf="showSuccessPopup"
     class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white rounded-2xl shadow-2xl p-6 w-[90%] max-w-md text-center">

    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <i class="fas fa-check text-green-600 text-2xl"></i>
    </div>

    <h2 class="text-xl font-bold text-gray-800">Succès</h2>

    <p class="text-gray-600 my-4">
      {{ successMessage }}
    </p>

    <button
      (click)="closeSuccess()"
      class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg"
    >
      OK
    </button>

  </div>
</div>

<!-- ================= ERROR POPUP ================= -->
<div *ngIf="showErrorPopup"
     class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white rounded-2xl shadow-2xl p-6 w-[90%] max-w-md text-center">

    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <i class="fas fa-times text-red-600 text-2xl"></i>
    </div>

    <h2 class="text-xl font-bold text-gray-800">Erreur</h2>

    <p class="text-gray-600 my-4">
      {{ errorMessage }}
    </p>

    <button
      (click)="closeError()"
      class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg"
    >
      Fermer
    </button>

  </div>
</div>
