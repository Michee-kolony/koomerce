<div class="py-32 bg-gray-50">

  <!-- LOADING -->
  <div *ngIf="loading"
       class="bg-white fixed top-0 left-0 right-0 bottom-0 flex justify-center items-center z-30">
    <span class="loader"></span>
  </div>

  <!-- VIDE -->
  <div *ngIf="!loading && commandes.length === 0"
       class="text-center mt-10 text-gray-500">
    Aucune commande trouvée
  </div>

  <!-- LISTE -->
  <div *ngIf="!loading && commandes.length > 0"
       class="p-4 space-y-4 min-h-screen">

    <div *ngFor="let cmd of commandes"
         class="bg-white rounded-2xl shadow-md p-3 flex items-center gap-3 container">

      <!-- IMAGE -->
      <img [src]="cmd.image1 || 'https://via.placeholder.com/80'"
           class="w-16 h-16 rounded-full object-cover" />

      <!-- INFOS -->
      <div class="flex-1">
        <h2 class="font-semibold text-gray-800 text-sm">
          {{ cmd.titre }}
        </h2>
        <p class="text-red-500 text-xs mt-1">
          {{ cmd.prix }} $
        </p>
      </div>

      <!-- STATUT -->
      <div class="text-right">

        <span class="text-xs px-2 py-1 rounded-full"
              [ngClass]="{
                'bg-yellow-100 text-yellow-600': cmd.status === 'en cours',
                'bg-blue-100 text-blue-600': cmd.status === 'en attente',
                'bg-green-100 text-green-600': cmd.status === 'livré',
                'bg-purple-100 text-purple-600': cmd.status === 'expédié',
                'bg-orange-100 text-orange-600': cmd.status === 'en préparation'
              }">
          {{ cmd.status }}
        </span>

        <p class="text-[10px] text-gray-400 mt-1">
          {{ cmd.createdAt | date:'dd MMMM yyyy' }}
        </p>

        <!-- BTN OUVRIR MODALE -->
        <button (click)="openModal(cmd._id)"
                class="text-xs px-3 py-1 rounded-full bg-red-100 text-red-600 hover:bg-red-200 transition mt-2">
          Annuler ma commande
        </button>

      </div>

    </div>

  </div>

</div>

<!-- ================= MODALE ================= -->
<div *ngIf="showModal"
     class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">

  <div class="bg-white rounded-2xl shadow-xl w-[90%] max-w-md p-6 transform transition-all scale-100">

    <!-- ICON -->
    <div class="flex justify-center">
      <div class="w-14 h-14 bg-red-100 text-red-600 flex items-center justify-center rounded-full text-2xl">
        !
      </div>
    </div>

    <!-- TEXTE -->
    <h2 class="text-center text-lg font-semibold mt-4">
      Annuler la commande ?
    </h2>

    <p class="text-center text-sm text-gray-500 mt-2">
      Cette action est irréversible. Voulez-vous vraiment continuer ?
    </p>

    <!-- ACTIONS -->
    <div class="flex justify-between gap-3 mt-6">

      <button (click)="closeModal()"
              class="w-full py-2 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700">
        Retour
      </button>

      <button (click)="confirmDelete()"
              class="w-full py-2 rounded-xl bg-red-500 hover:bg-red-600 text-white">
        Oui, annuler
      </button>

    </div>

  </div>

</div>
