<section class="bg-gray-50 min-h-screen py-32 px-4">

  <!-- HEADER -->
  <div class="mb-6 flex justify-between items-center container">
    <h1 class="text-2xl font-bold">Articles</h1>
  </div>

  <!-- GRID PRODUITS -->
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 container">

    <div *ngFor="let produit of paginatedProduits"
         [routerLink]="['/koomerce/details', produit._id]"
         class="bg-white cursor-pointer rounded-xl shadow-sm hover:shadow-md transition overflow-hidden">

      <!-- IMAGE -->
      <div class="relative">
        <img [src]="produit.image" class="w-full h-48 object-cover" />

        <span *ngIf="produit.promo"
          class="absolute top-2 left-2 bg-red-500 text-white text-xs px-2 py-1 rounded">
          -{{ produit.promo }}%
        </span>
      </div>

      <!-- INFOS -->
      <div class="p-3">
        <h3 class="text-sm font-semibold line-clamp-2">
          {{ produit.nom }}
        </h3>

        <div class="flex items-center gap-2 mt-2">
          <span class="text-red-500 font-bold">
            {{ produit.prix }}$
          </span>
          <span *ngIf="produit.ancienPrix" class="text-gray-400 line-through text-xs">
            {{ produit.ancienPrix }}$
          </span>
        </div>
      </div>

    </div>

  </div>

  <!-- 🔥 PAGINATION PRO -->
  <div class="flex justify-center items-center mt-10 container">

    <div class="flex items-center gap-2 bg-white shadow-md rounded-2xl px-4 py-2, container">

      <!-- PREV -->
      <button (click)="prevPage()"
              [disabled]="currentPage === 1"
              class="w-10 h-10 flex items-center justify-center rounded-xl transition
                     hover:bg-gray-100 disabled:opacity-30">
        ←
      </button>

      <!-- FIRST -->
      <button *ngIf="pages[0] > 1"
              (click)="goToPage(1)"
              class="w-10 h-10 rounded-xl hover:bg-gray-100">
        1
      </button>

      <span *ngIf="pages[0] > 2" class="px-1">...</span>

      <!-- NUMBERS -->
      <ng-container *ngFor="let page of pages">
        <button (click)="goToPage(page)"
                [ngClass]="{
                  'bg-black text-white shadow-md scale-105': currentPage === page,
                  'hover:bg-gray-100 text-gray-700': currentPage !== page
                }"
                class="w-10 h-10 flex items-center justify-center rounded-xl text-sm font-semibold transition-all duration-200">
          {{ page }}
        </button>
      </ng-container>

      <!-- LAST -->
      <span *ngIf="pages[pages.length - 1] < totalPages - 1">...</span>

      <button *ngIf="pages[pages.length - 1] < totalPages"
              (click)="goToPage(totalPages)"
              class="w-10 h-10 rounded-xl hover:bg-gray-100">
        {{ totalPages }}
      </button>

      <!-- NEXT -->
      <button (click)="nextPage()"
              [disabled]="currentPage === totalPages"
              class="w-10 h-10 flex items-center justify-center rounded-xl transition
                     hover:bg-gray-100 disabled:opacity-30">
        →
      </button>

    </div>

  </div>

</section>

<!-- LOADING -->
<div *ngIf="loading" class="bg-white fixed top-0 left-0 right-0 bottom-0 flex justify-center items-center">
  <span class="loader"></span>
</div>

<!-- NOTIFICATION -->
<div *ngIf="showNotification" class="fixed top-[10%] right-5 w-80 z-50">
  <div class="bg-white shadow-xl rounded-2xl p-4 flex gap-3">

    <img *ngIf="notificationImage"
         [src]="notificationImage"
         class="w-14 h-14 rounded-xl object-cover" />

    <div>
      <p class="font-semibold text-sm">{{ notification }}</p>
      <p class="text-xs text-gray-500">Nouvel article disponible</p>
    </div>

  </div>
</div>
