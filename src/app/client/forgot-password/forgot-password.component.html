<div class="min-h-screen flex items-center justify-center px-4 bg-cover bg-center bg-fixed" 
     [style.background-image]="'url(images/1.jpg)'">

  <div class="w-full max-w-md bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl p-8 space-y-6 border border-white/20 relative z-10">

    <!-- LOGO -->
    <div class="flex justify-center">
      <div class="w-24 h-24 rounded-full shadow-lg flex items-center justify-center overflow-hidden border-4 border-white">
        <img src="images/1 - Copie-Photoroom.png" />
      </div>
    </div>

    <!-- TITLE -->
    <div class="text-center">
      <h1 class="text-3xl font-bold text-gray-800">
        Mot de passe <span class="text-[#fe312e]">oublié</span>
      </h1>
      <p class="text-gray-600 mt-2">
        Entrez votre email, vous recevrez un lien de réinitialisation.
      </p>
    </div>

    <!-- FORM -->
    <form class="space-y-5" (ngSubmit)="onSubmit()">

      <!-- EMAIL -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-envelope mr-2 text-[#fe312e]"></i>
          Adresse email
        </label>

        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="exemple@gmail.com"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-[#fe312e] focus:ring-2 focus:ring-[#fe312e]/20 focus:outline-none transition-all duration-300"
          required
        />
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-[#fe312e] to-red-600 hover:from-red-600 hover:to-[#fe312e] text-white font-bold py-3.5 rounded-lg shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-0.5"
        [disabled]="loading || !email"
      >
        <span *ngIf="!loading">
          <i class="fas fa-paper-plane mr-2"></i>
          Envoyer le lien
        </span>

        <span *ngIf="loading">
          <i class="fas fa-spinner fa-spin mr-2"></i>
          Envoi en cours...
        </span>
      </button>

    </form>

    <!-- BACK LOGIN -->
    <div class="text-center pt-4">
      <p class="text-gray-600 text-sm">
        Retour à la connexion ?
        <a routerLink="/login" class="text-[#fe312e] font-bold hover:underline ml-1">
          Se connecter
        </a>
      </p>
    </div>

  </div>
</div>


<div *ngIf="showSuccessPopup" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white rounded-2xl shadow-2xl p-6 w-[90%] max-w-md text-center animate-fadeIn">

    <div class="flex justify-center mb-4">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center">
        <i class="fas fa-check text-green-600 text-2xl"></i>
      </div>
    </div>

    <h2 class="text-xl font-bold text-gray-800 mb-2">
      Succès
    </h2>

    <p class="text-gray-600 mb-6">
      {{ successMessage }}
    </p>

    <button
      (click)="closeSuccess()"
      class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-semibold"
    >
      OK
    </button>

  </div>
</div>


<div *ngIf="showErrorPopup" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white rounded-2xl shadow-2xl p-6 w-[90%] max-w-md text-center animate-fadeIn">

    <div class="flex justify-center mb-4">
      <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center">
        <i class="fas fa-times text-red-600 text-2xl"></i>
      </div>
    </div>

    <h2 class="text-xl font-bold text-gray-800 mb-2">
      Erreur
    </h2>

    <p class="text-gray-600 mb-6">
      {{ errorMessage }}
    </p>

    <button
      (click)="closeError()"
      class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-semibold"
    >
      Fermer
    </button>

  </div>
</div>
