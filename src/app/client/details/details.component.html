<div class="max-w-7xl mx-auto px-4 py-32">

  <!-- GRID -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

    <!-- LEFT : IMAGES -->
    <div>

      <!-- IMAGE PRINCIPALE -->
      <div class="w-full h-[400px] md:h-[500px] rounded-2xl overflow-hidden shadow-lg mb-6">
        <img [src]="selectedImage"
             class="w-full h-full object-cover transition-all duration-500">
      </div>

      <!-- SPLIDE THUMBNAILS -->
      <div id="thumbnail-carousel" class="splide">
        <div class="splide__track">
          <ul class="splide__list">

            <li class="splide__slide cursor-pointer"
                *ngFor="let img of images"
                (click)="changeImage(img)">
              <img [src]="img"
                   class="w-full h-24 object-cover rounded-lg border-2 hover:border-blue-500 transition">
            </li>

          </ul>
        </div>
      </div>

    </div>

    <!-- RIGHT : DETAILS -->
    <div class="flex flex-col justify-between">

      <div>
        <h1 class="text-3xl md:text-4xl font-bold mb-4">
          SmartWatch 9 Pro
        </h1>

        <!-- PRIX -->
        <div class="mb-6">
          <span class="text-3xl font-bold text-red-500">$129</span>
          <span class="ml-3 text-gray-400 line-through">$199</span>
        </div>

        <!-- DESCRIPTION -->
        <p class="text-gray-600 mb-6 leading-relaxed">
          Découvrez la nouvelle SmartWatch 9 Pro avec écran AMOLED,
          suivi de santé avancé, autonomie longue durée et design premium.
        </p>

        <!-- QUANTITÉ -->
        <div class="flex items-center gap-4 mb-6">
          <button class="px-4 py-2 bg-gray-200 rounded" (click)="decrease()">-</button>
          <span class="text-lg font-semibold">{{ quantity }}</span>
          <button class="px-4 py-2 bg-gray-200 rounded" (click)="increase()">+</button>
        </div>

      </div>

      <!-- ACTIONS -->
      <div class="flex flex-col sm:flex-row gap-4">
        <button class="w-full bg-red-500 text-white py-3 rounded-xl font-semibold transition">
          Ajouter au panier
        </button>
        <button class="w-full border border-gray-300 hover:bg-gray-100 py-3 rounded-xl font-semibold transition">
          Acheter maintenant
        </button>
      </div>

    </div>

  </div>

</div>
