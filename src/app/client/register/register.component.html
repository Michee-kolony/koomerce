<div class="min-h-screen py-20 flex items-center justify-center px-4 relative overflow-hidden bg-gradient-to-br from-red-400 via-red-500 to-red-700">

  <!-- DECORATIONS -->
  <div class="absolute w-72 h-72 bg-red-300 rounded-full blur-3xl opacity-30 top-10 left-10"></div>
  <div class="absolute w-96 h-96 bg-red-600 rounded-full blur-3xl opacity-30 bottom-10 right-10"></div>
  <div class="absolute w-60 h-60 bg-red-200 rounded-full blur-2xl opacity-20 top-1/2 left-1/3"></div>

  <div class="w-full max-w-md bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl p-8 space-y-6 border border-white/20 relative z-10">

    <!-- LOGO -->
    <div class="flex justify-center">
      <div class="w-24 h-24 rounded-full shadow-lg flex items-center justify-center overflow-hidden border-4 border-white">
        <img src="images/1 - Copie-Photoroom.png">
      </div>
    </div>

    <!-- TITLE -->
    <div class="text-center">
      <h1 class="text-3xl font-bold text-gray-800">
        App <span class="text-red-500">Koomerce</span>
      </h1>
      <p class="text-gray-600 mt-2">Créer votre compte</p>
    </div>

    <!-- FORM -->
    <form class="space-y-4" (ngSubmit)="onSubmit()">

      <!-- NOM -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-user mr-2 text-red-500"></i>
          Nom complet
        </label>

        <input
          [(ngModel)]="nom"
          name="nom"
          type="text"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-red-500 focus:ring-2 focus:ring-red-500/20 focus:outline-none"
          placeholder="Votre nom"
          required
        />
      </div>

      <!-- EMAIL -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-envelope mr-2 text-red-500"></i>
          Email
        </label>

        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-red-500 focus:ring-2 focus:ring-red-500/20 focus:outline-none"
          placeholder="client@email.com"
          required
        />
      </div>

      <!-- TELEPHONE -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-phone mr-2 text-red-500"></i>
          Téléphone
        </label>

        <input
          [(ngModel)]="telephone"
          name="telephone"
          type="text"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-red-500 focus:ring-2 focus:ring-red-500/20 focus:outline-none"
          placeholder="+243..."
          required
        />
      </div>

      <!-- ADRESSE -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-map-marker-alt mr-2 text-red-500"></i>
          Adresse
        </label>

        <input
          [(ngModel)]="adresse"
          name="adresse"
          type="text"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-red-500 focus:ring-2 focus:ring-red-500/20 focus:outline-none"
          placeholder="Votre adresse"
          required
        />
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-lock mr-2 text-red-500"></i>
          Mot de passe
        </label>

        <div class="relative">

          <input
            [(ngModel)]="password"
            name="password"
            [type]="showPassword ? 'text' : 'password'"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 pr-12 focus:border-red-500 focus:ring-2 focus:ring-red-500/20 focus:outline-none"
            placeholder="********"
            required
          />

          <button type="button"
                  (click)="togglePassword()"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500">
            <i *ngIf="!showPassword" class="fa fa-eye"></i>
            <i *ngIf="showPassword" class="fa fa-eye-slash"></i>
          </button>

        </div>
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-red-500 to-red-700 text-white font-bold py-3 rounded-lg shadow-lg"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Créer compte</span>
        <span *ngIf="loading">
          <i class="fas fa-spinner fa-spin"></i> Inscription...
        </span>
      </button>

    </form>

    <!-- LINK LOGIN -->
    <div class="text-center text-sm">
      Déjà inscrit ?
      <a routerLink="/login" class="text-red-500 font-bold">Se connecter</a>
    </div>

  </div>
</div>

<!-- SUCCESS POPUP -->
<div *ngIf="showSuccessPopup"
     class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white p-6 rounded-xl text-center w-[90%] max-w-md">

    <i class="fas fa-check-circle text-green-500 text-4xl"></i>

    <p class="font-bold mt-3">{{ successMessage }}</p>

    <p class="text-sm text-gray-500 mt-2">
      Redirection vers login dans 5 secondes...
    </p>

    <button (click)="closeSuccess()"
            class="mt-4 bg-green-600 text-white px-4 py-2 rounded">
      OK
    </button>

  </div>
</div>

<!-- ERROR POPUP -->
<div *ngIf="showErrorPopup"
     class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white p-6 rounded-xl text-center w-[90%] max-w-md">

    <i class="fas fa-times-circle text-red-500 text-4xl"></i>

    <p class="font-bold mt-3">{{ errorMessage }}</p>

    <button (click)="closeError()"
            class="mt-4 bg-red-600 text-white px-4 py-2 rounded">
      Fermer
    </button>

  </div>
</div>
