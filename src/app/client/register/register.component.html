<div class="min-h-screen flex items-center justify-center px-4 bg-cover bg-center bg-fixed"
     [style.background-image]="'url(images/1.jpg)'">

  <div class="w-full max-w-md bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl p-8 space-y-6 border border-white/20">

    <!-- LOGO -->
    <div class="flex justify-center">
      <div class="w-24 h-24 rounded-full shadow-lg flex items-center justify-center overflow-hidden border-4 border-white">
        <img src="images/1 - Copie-Photoroom.png">
      </div>
    </div>

    <!-- TITLE -->
    <div class="text-center">
      <h1 class="text-3xl font-bold text-gray-800">
        App <span class="text-[#fe312e]">Koomerce</span>
      </h1>
      <p class="text-gray-600 mt-2">Créer votre compte</p>
    </div>

    <!-- FORM -->
    <form class="space-y-4" (ngSubmit)="onSubmit()">

      <!-- NOM -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-user mr-2 text-[#fe312e]"></i>
          Nom complet
        </label>

        <input
          [(ngModel)]="nom"
          name="nom"
          type="text"
          class="w-full px-4 py-3 rounded-lg border"
          placeholder="Votre nom"
          required
        />
      </div>

      <!-- EMAIL -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-envelope mr-2 text-[#fe312e]"></i>
          Email
        </label>

        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          class="w-full px-4 py-3 rounded-lg border"
          placeholder="client@email.com"
          required
        />
      </div>

      <!-- TELEPHONE -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-phone mr-2 text-[#fe312e]"></i>
          Téléphone
        </label>

        <input
          [(ngModel)]="telephone"
          name="telephone"
          type="text"
          class="w-full px-4 py-3 rounded-lg border"
          placeholder="+243..."
          required
        />
      </div>

      <!-- ADRESSE -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-map-marker-alt mr-2 text-[#fe312e]"></i>
          Adresse
        </label>

        <input
          [(ngModel)]="adresse"
          name="adresse"
          type="text"
          class="w-full px-4 py-3 rounded-lg border"
          placeholder="Votre adresse"
          required
        />
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          <i class="fas fa-lock mr-2 text-[#fe312e]"></i>
          Mot de passe
        </label>

        <div class="relative">

          <input
            [(ngModel)]="password"
            name="password"
            [type]="showPassword ? 'text' : 'password'"
            class="w-full px-4 py-3 rounded-lg border pr-12"
            placeholder="********"
            required
          />

          <button type="button"
                  (click)="togglePassword()"
                  class="absolute right-3 top-1/2 -translate-y-1/2">
            <i *ngIf="!showPassword" class="fa fa-eye"></i>
            <i *ngIf="showPassword" class="fa fa-eye-slash"></i>
          </button>

        </div>
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-[#fe312e] to-red-600 text-white font-bold py-3 rounded-lg"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Créer compte</span>
        <span *ngIf="loading">
          <i class="fas fa-spinner fa-spin"></i> Inscription...
        </span>
      </button>

    </form>

    <!-- LINK LOGIN -->
    <div class="text-center text-sm">
      Déjà inscrit ?
      <a routerLink="/login" class="text-[#fe312e] font-bold">Se connecter</a>
    </div>

  </div>
</div>

<!-- SUCCESS POPUP -->
<div *ngIf="showSuccessPopup"
     class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white p-6 rounded-xl text-center w-[90%] max-w-md">

    <i class="fas fa-check-circle text-green-500 text-4xl"></i>

    <p class="font-bold mt-3">{{ successMessage }}</p>

    <p class="text-sm text-gray-500 mt-2">
      Redirection vers login dans 5 secondes...
    </p>

    <button (click)="closeSuccess()"
            class="mt-4 bg-green-600 text-white px-4 py-2 rounded">
      OK
    </button>

  </div>
</div>

<!-- ERROR POPUP -->
<div *ngIf="showErrorPopup"
     class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white p-6 rounded-xl text-center w-[90%] max-w-md">

    <i class="fas fa-times-circle text-red-500 text-4xl"></i>

    <p class="font-bold mt-3">{{ errorMessage }}</p>

    <button (click)="closeError()"
            class="mt-4 bg-red-600 text-white px-4 py-2 rounded">
      Fermer
    </button>

  </div>
</div>
