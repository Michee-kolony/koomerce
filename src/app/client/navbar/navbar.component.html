<!-- Overlay recherche -->
<div *ngIf="search" 
     class="fixed inset-0 z-50 bg-black/60 backdrop-blur-xl overflow-auto transition-opacity duration-300">

  <!-- Bouton fermer -->
  <button (click)="launchsearch()"
          class="absolute top-4 right-6 text-white text-3xl font-light hover:text-red-500 transition">
    &times;
  </button>

  <!-- Barre de recherche -->
  <div class="mt-12 container mx-auto px-4">
    <div class="flex justify-center">
      <div class="relative w-full max-w-xl">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
        <input type="text"
               placeholder="Rechercher un produit..."
               [(ngModel)]="searchQuery"
               class="w-full pl-12 pr-4 py-3 rounded-full bg-white/10 backdrop-blur-md text-white
                      border border-white/20 placeholder-gray-300 
                      focus:outline-none focus:ring-2 focus:ring-red-500 transition"
        />
      </div>
    </div>
  </div>

  <!-- Résultats -->
  <div class="container mx-auto px-4 mt-10 pb-10">
    <div class="grid gap-4 grid-cols-2 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-4">
      <div *ngFor="let produit of produitsFiltres" 
            [routerLink]="['/koomerce/details', produit._id]"
            (click)="launchsearch()"
           class="relative rounded-2xl overflow-hidden group cursor-pointer shadow-md hover:shadow-xl transition duration-300">

        <!-- IMAGE FULL -->
        <img [src]="produit.image1"
             class="w-full h-64 object-cover transition duration-500 group-hover:scale-110" />

        <!-- OVERLAY GRADIENT -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>

        <!-- INFOS -->
        <div class="absolute bottom-3 left-3 right-3 text-white">
          <h3 class="text-sm font-semibold line-clamp-2">
            {{ produit.titre }}
          </h3>

          <div class="flex items-center gap-2 mt-1">
            <span class="font-bold text-red-400">
              {{ produit.prixReduit || produit.prix }}$
            </span>
            <span *ngIf="produit.prixReduit && produit.prixReduit !== produit.prix" 
                  class="text-xs line-through text-gray-300">
              {{ produit.prix }}$
            </span>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="produitsFiltres.length === 0" class="text-center text-white mt-10 text-lg">
      Aucun produit trouvé.
    </div>
  </div>
</div>
