<section
*ngIf="user; else notLogged"
 class="bg-gray-50 min-h-screen py-32 px-4 md:px-10">

  <div class="max-w-6xl mx-auto">

    <h1 class="text-3xl md:text-4xl font-bold mb-8 text-gray-800">
      Mon Panier
    </h1>

    <div class="grid lg:grid-cols-3 gap-8">

      <div class="lg:col-span-2 space-y-6">

        <p *ngIf="loading">Chargement du panier...</p>

        <div *ngFor="let produit of produits"
             class="bg-white rounded-2xl shadow-md p-4 flex flex-col md:flex-row items-center gap-4">

          <img [src]="produit.image" [routerLink]="['/koomerce/details', produit.produitId]"
               class="w-28 h-28 object-cover rounded-xl cursor-pointer"
               alt="produit">

          <div class="flex-1 w-full">
            <h2 class="font-semibold text-lg text-gray-800">
              {{ produit.titre }}
            </h2>

            <p class="text-red-500 font-bold mt-2">
              {{ produit.prixReduit }} $
            </p>

            <div class="flex items-center mt-4 gap-3">

              <button (click)="diminuerQuantite(produit)"
                      class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">
                -
              </button>

              <span class="font-semibold">
                {{ produit.quantite }}
              </span>

              <button (click)="augmenterQuantite(produit)"
                      class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">
                +
              </button>

            </div>
          </div>

          <div class="text-right">
            <p class="font-bold text-gray-800">
              {{ produit.prixReduit * produit.quantite }} $
            </p>

            <button (click)="supprimerProduit(produit._id)"
                    class="text-red-500 text-sm mt-2 hover:underline">
              Supprimer
            </button>
          </div>

        </div>

      </div>

      <div class="bg-white rounded-2xl shadow-lg p-6 h-fit sticky top-10" *ngIf="!loading">

        <h2 class="text-xl font-bold mb-6">
          Résumé
        </h2>

        <div class="flex justify-between mb-4">
          <span>Sous-total</span>
          <span>{{ getTotal() }} $</span>
        </div>
        <hr class="my-4">

        <div class="flex justify-between text-lg font-bold">
          <span>Total</span>
          <span class="text-red-500">{{ getTotal() }} $</span>
        </div>

      </div>

    </div>

  </div>

</section>

<!-- 🔥 SI NON CONNECTÉ -->
<ng-template #notLogged>
  <div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-md w-full space-y-6">

      <h2 class="text-xl font-bold text-gray-800">
        Vous devez être connecté
      </h2>

      <p class="text-gray-500 text-sm">
        Connectez-vous pour accéder à cette page.
      </p>

      <button routerLink="/login"
              class="w-full bg-red-600 text-white py-3 rounded-lg hover:bg-red-700 transition font-medium">
        Se connecter
      </button>

    </div>

  </div>
</ng-template>
