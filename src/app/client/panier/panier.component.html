<section
*ngIf="user; else notLogged"
 class="bg-gray-50 min-h-screen py-32 px-4 md:px-10">

  <div class="max-w-6xl mx-auto">

    <h1 class="text-3xl md:text-4xl font-bold mb-8 text-gray-800">
      🛒 Mon Panier
    </h1>

    <div class="grid lg:grid-cols-3 gap-8">

      <div class="lg:col-span-2 space-y-6">

        <div *ngFor="let produit of produits"
             class="bg-white rounded-2xl shadow-md p-4 flex flex-col md:flex-row items-center gap-4">

          <img [src]="produit.image"
               class="w-28 h-28 object-cover rounded-xl"
               alt="produit">

          <div class="flex-1 w-full">
            <h2 class="font-semibold text-lg text-gray-800">
              {{ produit.titre }}
            </h2>

            <p class="text-red-500 font-bold mt-2">
              {{ produit.prixReduit }} $
            </p>

            <div class="flex items-center mt-4 gap-3">

              <button (click)="diminuerQuantite(produit)"
                      class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">
                -
              </button>

              <span class="font-semibold">
                {{ produit.quantite }}
              </span>

              <button (click)="augmenterQuantite(produit)"
                      class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">
                +
              </button>

            </div>
          </div>

          <div class="text-right">
            <p class="font-bold text-gray-800">
              {{ produit.prixReduit * produit.quantite }} $
            </p>

            <button (click)="supprimerProduit(produit._id)"
                    class="text-red-500 text-sm mt-2 hover:underline">
              Supprimer
            </button>
          </div>

        </div>

      </div>

      <div class="bg-white rounded-2xl shadow-lg p-6 h-fit sticky top-10">

        <h2 class="text-xl font-bold mb-6">
          Résumé
        </h2>

        <div class="flex justify-between mb-4">
          <span>Sous-total</span>
          <span>{{ getTotal() }} $</span>
        </div>

        <div class="flex justify-between mb-4">
          <span>Livraison</span>
          <span class="text-green-500">Gratuite</span>
        </div>

        <hr class="my-4">

        <div class="flex justify-between text-lg font-bold">
          <span>Total</span>
          <span class="text-red-500">{{ getTotal() }} $</span>
        </div>

        <button class="w-full mt-6 bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-semibold transition">
          Passer la commande
        </button>

      </div>

    </div>

  </div>

</section>

<ng-template #notLogged>
  <div class="min-h-screen flex flex-col items-center justify-center bg-gray-50 text-center px-4">

    <div class="bg-white border shadow-lg rounded-2xl p-8 max-w-md w-full">

      <h2 class="text-xl font-bold text-gray-800 mb-4">
        Accès restreint
      </h2>

      <p class="text-gray-600 mb-6">
        Connecte-toi pour voir ton panier et passer commande.
      </p>

      <button (click)="goToLogin()"
              class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-xl font-semibold transition">
        Se connecter
      </button>

    </div>

  </div>
</ng-template>
